<p>嘉義高中管樂隊第 41 屆校友暨在校生聯合音樂會《為伍》，將於 <b>2026 年 8 月 8 日（六）14:30</b> 在<b>嘉義市政府文化局音樂廳</b>演出。</p>
<p>本屆聯演睽違六年重返文化局音樂廳（上一次為 2020 年第 36 屆《親子九九（Parent-Child 99）》），透過 OPENTIX 兩廳院文化生活售票系統公開售票。售票連結與票價資訊將於近期公布，歡迎鎖定本站與粉絲專頁。</p>
<p>「為伍」取「做伙伴、在一起」之意——來自各地的校友與在校生，將再一次因音樂同行。歡迎歷屆校友、親朋好友與所有喜愛管樂的朋友到場聆賞。</p>
<p class="muted">曲目與演出人員以正式節目公告為準。</p>
