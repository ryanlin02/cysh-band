<p>期末考最後一科交卷，社辦外的烤肉架也升火了。6 月 30 日晚間，在校生管樂社的「期末肉趴」熱鬧登場，指導老師<a href="../people/8861.html">簡晟軒</a>（編號 8861）帶著學弟們在考試結束的夜晚好好放鬆——炭火、烤肉、汽水，還有整個走廊的笑聲。</p>

  <img src="../assets/img/news/2026-06-30-bbq.webp" alt="在校生於社辦外走廊圍坐烤肉，慶祝期末考結束">
  <figcaption>考完最後一科的夜晚：社辦外的期末肉趴。</figcaption>

<p>「團練完烤肉」其實是嘉中管樂流傳已久的傳統——老校友的回憶裡，就有當年與嘉義高商團練結束後一起烤肉的熱鬧場景。爐火換了一代又一代，配方沒變：一群因為音樂聚在一起的人，總能把任何場地變成家。</p>

<p>放鬆過後，重頭戲登場：暑假的《為伍》密集團練即將展開，在校生將與陸續歸隊的歷屆校友一起排練，朝 8 月 8 日文化局音樂廳的舞台前進。這個夏天，學長姐回家，學弟們接棒——為伍，一起同行。</p>
