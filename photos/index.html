<title>影像館｜嘉義高中管樂隊暨校友管樂團</title>
<meta name="description" content="嘉義高中管樂隊暨校友管樂團影像館：歷年活動照片完整典藏，八千餘張持續增加。以時間軸瀏覽，也可依活動、人物分類或關鍵字搜尋。">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta property="og:title" content="影像館｜嘉義高中管樂隊暨校友管樂團">
<meta property="og:description" content="歷年活動照片完整典藏，以時間軸瀏覽，也可依活動、人物分類或關鍵字搜尋。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cysh.band/photos/">
<link rel="canonical" href="https://cysh.band/photos/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;family=Noto+Sans+TC:wght@400;700&amp;family=Noto+Serif+TC:wght@700;900&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
  try {
    localStorage.setItem('cyshMemberAccessUntil', String(Date.now() + 7 * 24 * 60 * 60 * 1000));
  } catch (error) {
    /* 停用本機儲存不影響 Cloudflare Access 驗證與影像館本身。 */
  }
</script>
</head>
<body>

<!-- 頂部列（電腦版含分頁；手機版只有標題與搜尋鈕） -->
<header id="topbar">
  <div class="topbar-inner">
    <button id="backBtn" class="icon-btn hidden" aria-label="返回"><svg class="ico-svg"><use href="#i-back"/></svg></button>
    <h1 id="siteTitle">嘉中管樂 影像館<span class="latin">GALLERY</span></h1>
    <nav id="desktopNav" class="desktop-only">
      <a href="#/timeline" data-view="timeline" class="active">時間軸</a>
      <a href="#/albums" data-view="albums">相簿</a>
      <a href="#/people" data-view="people">人物</a>
      <a href="#/search" data-view="search">搜尋</a>
    </nav>
    <a href="https://cysh.band/" id="homeBtn" class="icon-btn" aria-label="回官網" title="回官網"><svg class="ico-svg"><use href="#i-home"/></svg></a>
  </div>
</header>

<!-- 時間軸縮放切換（僅時間軸顯示） -->
<div id="zoomBar" class="hidden">
  <div class="seg">
    <button data-zoom="album" class="active">活動</button>
    <button data-zoom="month">月</button>
    <button data-zoom="year">年</button>
  </div>
</div>

<!-- 子頁面標頭（相簿內頁 / 人物內頁 / 搜尋） -->
<div id="subHeader" class="hidden"></div>

<!-- 主要內容（時間軸為虛擬化渲染：只掛載視窗附近的照片列） -->
<main id="content"></main>
<div id="loading"><div class="spin"></div>照片載入中…</div>

<!-- 年份快速捲動條：平時只顯示小把手，拖曳時顯示年份氣泡；捲動時日期籤顯示在把手旁 -->
<div id="scrubber" class="hidden">
  <div id="floatDate" class="hidden"></div>
  <div id="scrubberTrack"></div>
  <div id="scrubHandle">︿<br>﹀</div>
  <div id="scrubberBubble" class="hidden"></div>
</div>

<!-- 手機底部導覽列 -->
<nav id="bottomNav" class="mobile-only">
  <a href="#/timeline" data-view="timeline"><svg class="ico-svg"><use href="#i-clock"/></svg>時間軸</a>
  <a href="#/albums" data-view="albums"><svg class="ico-svg"><use href="#i-folder"/></svg>相簿</a>
  <a href="#/people" data-view="people"><svg class="ico-svg"><use href="#i-person"/></svg>人物</a>
  <a href="#/search" data-view="search"><svg class="ico-svg"><use href="#i-search"/></svg>搜尋</a>
</nav>

<!-- SVG 圖示庫（全站共用，確保外觀一致） -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M4.5 10.5L12 4l7.5 6.5"/><path d="M6.5 9.5V19h11V9.5"/></symbol>
  <symbol id="i-close" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></symbol>
  <symbol id="i-back" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></symbol>
  <symbol id="i-prev" viewBox="0 0 24 24"><path d="M14.5 5.5L8 12l6.5 6.5"/></symbol>
  <symbol id="i-next" viewBox="0 0 24 24"><path d="M9.5 5.5L16 12l-6.5 6.5"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 4v11M6.5 10.5L12 16l5.5-5.5M5 20h14"/></symbol>
  <symbol id="i-share" viewBox="0 0 24 24"><path d="M10.5 13.5a4 4 0 0 0 5.66 0l2.84-2.84a4 4 0 1 0-5.66-5.66l-1.2 1.2"/><path d="M13.5 10.5a4 4 0 0 0-5.66 0L5 13.34A4 4 0 1 0 10.66 19l1.2-1.2"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 7.8v.4"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24"><path d="M8.5 5.8v12.4L18.5 12z"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24"><path d="M8.5 5.5v13M15.5 5.5v13"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2.5"/></symbol>
  <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3.5 7A1.5 1.5 0 0 1 5 5.5h4l2 2.5h8A1.5 1.5 0 0 1 20.5 9.5v8A1.5 1.5 0 0 1 19 19H5a1.5 1.5 0 0 1-1.5-1.5z"/></symbol>
  <symbol id="i-person" viewBox="0 0 24 24"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 19.5c1.4-3.2 4-4.8 7-4.8s5.6 1.6 7 4.8"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M15.8 15.8L20.5 20.5"/></symbol>
</svg>

<!-- 燈箱（全螢幕看照片） -->
<div id="lightbox" class="hidden" aria-modal="true" role="dialog">
  <div id="lbTop">
    <button id="lbClose" class="icon-btn" aria-label="關閉"><svg class="ico-svg"><use href="#i-close"/></svg></button>
    <span id="lbCounter"></span>
    <span class="lb-spacer"></span>
    <button id="lbPlay" class="icon-btn" title="幻燈片播放"><svg class="ico-svg"><use href="#i-play"/></svg></button>
    <a id="lbDownload" class="icon-btn" download title="下載此照片（JPG）"><svg class="ico-svg"><use href="#i-download"/></svg></a>
    <button id="lbShare" class="icon-btn" title="複製連結"><svg class="ico-svg"><use href="#i-share"/></svg></button>
    <button id="lbInfo" class="icon-btn" title="照片資訊"><svg class="ico-svg"><use href="#i-info"/></svg></button>
  </div>
  <div id="lbMain">
    <div id="lbStage">
      <!-- 雙圖層：新照片載入完成後才交叉淡化，避免切換時閃黑 -->
      <img id="lbImg" class="lb-photo" alt="">
      <img id="lbImg2" class="lb-photo" alt="">
    </div>
    <button id="lbPrev" class="lb-arrow desktop-only" aria-label="上一張"><svg class="ico-svg"><use href="#i-prev"/></svg></button>
    <button id="lbNext" class="lb-arrow desktop-only" aria-label="下一張"><svg class="ico-svg"><use href="#i-next"/></svg></button>
    <div class="lb-swipe-hint mobile-only">上滑看照片資訊</div>
  </div>
  <div id="lbPanel" class="hidden"></div>
  <div id="lbToast" class="hidden">已複製連結</div>
</div>

<script src="config.js"></script>
<script src="profile-links.js"></script>
<script src="app.js"></script>
</body>
</html>
